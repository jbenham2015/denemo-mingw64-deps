name: Build Denemo MinGW64 Dependencies

on:
  workflow_dispatch:
  push:
    tags:
      - 'deps-v*'

jobs:
  build-deps:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            git
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-gc
            mingw-w64-x86_64-libunistring
            mingw-w64-x86_64-libiconv
            mingw-w64-x86_64-gettext
            mingw-w64-x86_64-libffi
            mingw-w64-x86_64-glib2
            mingw-w64-x86_64-gtk3
            mingw-w64-x86_64-libxml2
            mingw-w64-x86_64-portaudio
            mingw-w64-x86_64-fluidsynth
            mingw-w64-x86_64-libsndfile
            mingw-w64-x86_64-aubio
            mingw-w64-x86_64-autotools
            mingw-w64-x86_64-texinfo
            mingw-w64-x86_64-gperf

      - name: Clone patched Guile
        run: |
          git clone --branch wip-mingw-2025 --depth 1 \
            https://github.com/jbenham2015/guile.git guile-src

      - name: Bootstrap Guile
        working-directory: guile-src
        run: ./autogen.sh

      - name: Configure Guile
        working-directory: guile-src
        run: |
          ./configure \
            --prefix=/mingw64 \
            --enable-mini-gmp \
            --enable-shared \
            --enable-static \
            --disable-nls \
            CFLAGS="-g -O2 -Wno-incompatible-pointer-types -Wno-int-conversion" \
            CPPFLAGS="-I/mingw64/include -isystem C:/msys64/mingw64/include" \
            LDFLAGS="-L/mingw64/lib" \
            PKG_CONFIG_PATH="/mingw64/lib/pkgconfig" \
            BDW_GC_CFLAGS="-I/mingw64/include" \
            BDW_GC_LIBS="-L/mingw64/lib -lgc"

      - name: Build Guile
        working-directory: guile-src
        run: make -j1 2>&1 | tee /d/a/denemo-mingw64-deps/denemo-mingw64-deps/guile-build.log

      - name: Install Guile
        working-directory: guile-src
        run: make install

      - name: Verify Guile
        run: |
          /mingw64/bin/guile --version
          pkg-config --modversion guile-3.0

      - name: Collect Guile artifacts
        run: |
          ls /mingw64/bin/guild* || echo "no guild found"
          cd /
          tar czf /d/a/denemo-mingw64-deps/denemo-mingw64-deps/denemo-mingw64-deps.tar.gz \
            mingw64/bin/guile.exe \
            mingw64/bin/guile-config \
            mingw64/bin/guild \
            mingw64/bin/libguile-3.0-1.dll \
            mingw64/lib/libguile* \
            mingw64/lib/guile/3.0/ccache \
            mingw64/lib/pkgconfig/guile-3.0.pc \
            mingw64/include/guile \
            mingw64/share/guile

      - name: Collect Guile artifacts
        run: |
          # Check what guild-related files were installed
          ls /mingw64/bin/guild* || echo "no guild found"
          cd /
          tar czf /d/a/denemo-mingw64-deps/denemo-mingw64-deps/denemo-mingw64-deps.tar.gz \
            mingw64/bin/guile.exe \
            mingw64/bin/guile-config \
            mingw64/bin/guild \
            mingw64/bin/libguile-3.0-1.dll \
            mingw64/lib/libguile* \
            mingw64/lib/pkgconfig/guile-3.0.pc \
            mingw64/include/guile \
            mingw64/share/guile
          ls -lh /d/a/denemo-mingw64-deps/denemo-mingw64-deps/denemo-mingw64-deps.tar.gz

      - name: Upload deps artifact
        uses: actions/upload-artifact@v4
        with:
          name: denemo-mingw64-deps
          path: D:\a\denemo-mingw64-deps\denemo-mingw64-deps\denemo-mingw64-deps.tar.gz
          retention-days: 90

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: guile-build-log
          path: D:\a\denemo-mingw64-deps\denemo-mingw64-deps\guile-build.log

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ github.workspace }}/denemo-mingw64-deps.tar.gz
          name: Denemo MinGW64 Dependencies ${{ github.ref_name }}
          body: |
            MinGW64 dependency bundle for building Denemo on Windows.
            Includes: Guile (wip-mingw-2025), GTK3, FluidSynth, PortAudio,
            libxml2, aubio, and all other Denemo dependencies.
