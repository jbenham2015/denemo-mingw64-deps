name: Build Denemo

on:
  push:
    branches: [master, mingw64]
  workflow_dispatch:

jobs:
  build-denemo:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-autotools

      # ── Download pre-built deps from denemo-mingw64-deps ─────────────────

      - name: Download deps artifact
        uses: dawidd6/action-download-artifact@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          repo: jbenham2015/denemo-mingw64-deps
          name: denemo-mingw64-deps
          path: /tmp/

      - name: Extract deps
        run: |
          cd /tmp
          tar xzf denemo-mingw64-deps.tar.gz
          # Copy everything into the mingw64 prefix
          cp -r /tmp/denemo-deps/include/* /mingw64/include/
          cp -r /tmp/denemo-deps/lib/* /mingw64/lib/
          cp -r /tmp/denemo-deps/bin/* /mingw64/bin/
          cp -r /tmp/denemo-deps/share-guile /mingw64/share/guile

      - name: Verify Guile is available
        run: |
          /mingw64/bin/guile --version
          pkg-config --modversion guile-3.0

      # ── Build Denemo ──────────────────────────────────────────────────────

      - name: Bootstrap Denemo
        run: autoreconf -fi

      - name: Configure Denemo
        run: |
          ./configure \
            --prefix=/mingw64 \
            CFLAGS="-g -O2 -Wno-incompatible-pointer-types -Wno-int-conversion" \
            CPPFLAGS="-I/mingw64/include" \
            LDFLAGS="-L/mingw64/lib" \
            PKG_CONFIG_PATH="/mingw64/lib/pkgconfig"

      - name: Build Denemo
        run: make -j$(nproc) 2>&1 | tee denemo-build.log

      - name: Install Denemo
        run: make install

      # ── Artifacts ─────────────────────────────────────────────────────────

      - name: Upload Denemo binary
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: denemo-mingw64
          path: |
            /mingw64/bin/denemo.exe
            /mingw64/share/denemo/

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: denemo-build-log
          path: denemo-build.log
